         	line-height: 1.8;
         	opacity: 0.85;
         	margin-bottom: 35px;
         }

         .hero-text a.button {
         	display: inline-block;
         	padding: 12px 34px;
         	border: 1px solid white;
         	border-radius: 30px;
         	color: lightpink;
         	text-decoration: none;
         	letter-spacing: 2px;
         	font-size: 12px;
         	transition: 0.3s;
         }

         .hero-text a.button:bover {
         	background: white;
         	color: black;
